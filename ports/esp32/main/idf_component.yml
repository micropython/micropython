dependencies:
  espressif/mdns: "~1.1.0"
  espressif/tinyusb:
    rules:
      - if: "target in [esp32s2, esp32s3, esp32p4, esp32s31]"
    version: "0.19.0~3"
  espressif/esp_hosted:
    rules:
      - if: "target == esp32p4"
    version: "2.12.8"
  espressif/esp_wifi_remote:
    rules:
      - if: "target == esp32p4"
    version: "1.6.0"
  espressif/eppp_link:
    version: "1.1.3"
    rules:
      - if: "target == esp32p4"
  espressif/lan867x:
    version: "~1.0.0"
    rules:
      - if: "target == esp32"
  # Ethernet PHY drivers (moved from ESP-IDF to Component Registry)
  espressif/ip101:
    version: "~1.0.0"
    rules:
      - if: "target == esp32"
  espressif/lan87xx:
    version: "~1.0.0"
    rules:
      - if: "target == esp32"
  espressif/rtl8201:
    version: "~1.0.0"
    rules:
      - if: "target == esp32"
  espressif/dp83848:
    version: "~1.0.0"
    rules:
      - if: "target == esp32"
  espressif/ksz80xx:
    version: "~1.0.0"
    rules:
      - if: "target == esp32"
